body::after{
  content:"";
  position: fixed; inset: 0;
  background: linear-gradient(180deg, rgba(253,251,248,0.55) 0%, rgba(253,251,248,0.86) 55%, rgba(253,251,248,0.96) 100%);
  z-index: 0;
}

#custom-alert {
  position: fixed; top: 15px; left: 50%; transform: translateX(-50%) translateY(-150%);
  width: 90%; max-width: 320px; background: var(--error); color: white;
  text-align: center; padding: 12px; border-radius: 10px; font-weight: 600;
  z-index: 9999; transition: transform 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
  box-shadow: 0 8px 20px rgba(192, 57, 43, 0.25); font-size: 14px;
}
#custom-alert.show { transform: translateX(-50%) translateY(0); }

#sync-status {
  position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
  display: flex; align-items: center; gap: 6px;
  font-size: 10px; color: var(--navy-faint); white-space: nowrap;
  transition: opacity 0.4s;
}
#sync-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--green); flex-shrink: 0;
  box-shadow: 0 0 0 0 rgba(63, 166, 107, 0.4);
}
#sync-dot.pulsing { animation: pulse-dot 1.2s infinite; }
@keyframes pulse-dot {
  0%   { box-shadow: 0 0 0 0 rgba(63, 166, 107, 0.5); background: var(--green); }
  50%  { box-shadow: 0 0 0 5px rgba(63, 166, 107, 0); background: #8fd6ac; }
  100% { box-shadow: 0 0 0 0 rgba(63, 166, 107, 0); background: var(--green); }
}
#sync-dot.error { background: var(--error); box-shadow: none; animation: none; }

#refresh-bar-wrap {
  position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
  background: transparent; border-radius: 0 0 28px 28px; overflow: hidden;
}
#refresh-bar {
  height: 100%; width: 100%;
  background: linear-gradient(90deg, var(--orange-deep), var(--orange));
  transform-origin: left;
  transition: transform 1s linear;
}

.wrap {
  height: 100vh; width: 100%; display: flex; align-items: center; justify-content: center;
  padding: 15px; position: relative; z-index: 1;
}

.admin-trigger {
  position: absolute; top: 15px; left: 15px; background: none; border: none;
  font-size: 18px; cursor: pointer; opacity: 0.18; transition: 0.3s; z-index: 100;
}
.admin-trigger:hover { opacity: 1; }

.card {
  background: var(--white); width: 100%; max-width: 380px;
  border-radius: 28px; position: relative;
  box-shadow: 0 20px 45px rgba(43,58,64,0.12), 0 2px 0 rgba(237,158,6,0.35);
  transition: all 0.4s ease;
  display: flex; flex-direction: column; justify-content: center;
  overflow: hidden;
  border-top: 4px solid var(--orange);
}

.card-body { padding: 32px 25px 50px; display: flex; flex-direction: column; gap: 15px; }

.logo-word{
  font-family: 'Arial', sans-serif; font-weight: 700; font-size: 26px;
  text-align: center; color: var(--navy); letter-spacing: -0.5px;
}
.logo-word span{ color: var(--orange); }

.pg-title{text-align:center;}
.pg-title h2{
  font-family: 'Arial', serif; font-style: italic; font-weight: 600;
  font-size: 24px; color: var(--navy); letter-spacing: 0.3px;
}
.pg-title p{font-size:13px; color:var(--navy-soft); margin-top: 5px;}

.option-btn {
  width: 100%; padding: 16px 18px;
  border: 1.5px solid var(--line); border-radius: 16px;
  background: var(--white); cursor: pointer;
  display: flex; align-items: center; gap: 14px;
  transition: all 0.2s; text-align: left;
}
.option-btn:hover { border-color: var(--orange); background: var(--orange-wash); }
.option-icon {
  width: 40px; height: 40px; border-radius: 12px;
  background: var(--orange-wash); display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.option-label { font-size: 15px; font-weight: 700; color: var(--navy); }
.option-desc { font-size: 12px; color: var(--navy-soft); margin-top: 2px; }

.field{display:flex; flex-direction:column; gap:4px;}
.lbl{font-size:10px; font-weight:700; color:var(--navy-soft); text-transform: uppercase; letter-spacing: 0.5px;}
.inp{
  background:var(--paper); border:1.5px solid var(--line); border-radius:12px; padding:14px 15px;
  font-size:16px; outline:none; transition: 0.2s; width: 100%; color: var(--navy);
}
.inp:focus{border-color:var(--orange); background:#fff;}

.btn-primary{
  width:100%; padding:16px; border:none; border-radius:14px; font-size:16px;
  font-weight:700; cursor:pointer; background:var(--orange); color:var(--navy);
  box-shadow: 0 6px 15px rgba(237, 158, 6, 0.3);
  transition: opacity 0.2s;
}
.btn-primary:active { opacity: 0.85; }

.btn-back-link {
  background: none; border: none; color: var(--navy-soft); font-size: 13px; font-weight: 600;
  cursor: pointer; text-align: center; padding: 6px; text-decoration: underline;
  text-underline-offset: 3px;
}

#result {
  display: none; width: 100%;
  flex-direction: column; align-items: center; justify-content: center;
  text-align: center; padding: 35px 30px 50px; animation: fadeIn 0.4s ease;
}
.res-label { font-size: 11px; font-weight: 700; color: var(--navy-soft); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
.res-val {
  font-family: 'Arial', serif; font-style: italic; font-weight: 600;
  font-size: 58px; color: var(--orange-deep); line-height: 1; margin-bottom: 15px;
}
.res-name { font-size: 16px; font-weight: 600; color: var(--navy); text-transform: capitalize; margin-bottom: 20px; }
.res-pill {
  background: var(--orange-wash); border-radius: 10px; padding: 10px 18px;
  font-size: 13px; color: var(--navy-soft); margin-bottom: 6px; width: 100%;
}
.res-pill strong { color: var(--orange-deep); }

.btn-back { margin-top: 20px; background: var(--paper); color: var(--navy-soft); border: 1px solid var(--line); padding: 12px 24px; border-radius: 12px; font-weight: 600; cursor: pointer; font-size: 13px; }

@keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
.slide-in { animation: slideIn 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
@keyframes slideIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div id="custom-alert">Dados não encontrados. Tente outra opção.</div>

<div class="wrap">
  <button class="admin-trigger" onclick="toggleAdmin()">⚙️</button>

  <div class="card" id="mainCard">

    <!-- TELA 1: Escolher método -->
    <div class="card-body" id="screenChoose">
      <div class="logo-word">dem<span>ā</span></div>
      <div class="pg-title">
        <h2>Consulta de Sala</h2>
        <p>Como deseja se identificar?</p>
      </div>

      <button class="option-btn" onclick="chooseMethod('nome')">
        <div class="option-icon">👤</div>
        <div>
          <div class="option-label">Nome Completo</div>
          <div class="option-desc">Buscar pelo seu nome no cadastro</div>
        </div>
      </button>

      <button class="option-btn" onclick="chooseMethod('cpf')">
        <div class="option-icon">🪪</div>
        <div>
          <div class="option-label">CPF</div>
          <div class="option-desc">Buscar pelo seu número de CPF</div>
        </div>
      </button>

      <button class="option-btn" onclick="chooseMethod('matricula')">
        <div class="option-icon">🔢</div>
        <div>
          <div class="option-label">Matrícula</div>
          <div class="option-desc">Buscar pelo número de matrícula</div>
        </div>
      </button>
    </div>

    <!-- TELA 2: Campo de input -->
    <div class="card-body slide-in" id="screenInput" style="display:none;">
      <div class="pg-title">
        <h2 id="inputTitle">Digite seu nome</h2>
        <p id="inputDesc">Exatamente como está no cadastro</p>
      </div>

      <div class="field">
        <label class="lbl" id="inputLabel">Nome Completo</label>
        <input class="inp" id="iValor" type="text" placeholder="" inputmode="text" autocomplete="off" autocorrect="off" spellcheck="false"/>
      </div>

      <button class="btn-primary" onclick="doSearch()">Verificar Sala</button>
      <button class="btn-back-link" onclick="goBack()">← Escolher outro método</button>
    </div>

    <!-- TELA 3: Resultado -->
    <div id="result">
      <div class="res-name" id="nomeVal">--</div>
      <span class="res-label">Sua sala é</span>
      <div class="res-val" id="salaVal">--</div>
      <div class="res-pill">Local: <strong id="predioVal">--</strong></div>
      <div class="res-pill">Código: <strong id="turmaCodVal">--</strong></div>
      <div class="res-pill">Dia/Turno: <strong id="diaSemanaVal">--</strong></div>
      <button class="btn-back" onclick="resetSearch()">← Nova consulta</button>
    </div>

    <!-- Painel Admin -->
    <div id="adminPanel" style="display:none;" class="card-body">
      <div class="pg-title"><h2>Configurações</h2></div>
      <div class="field"><label class="lbl">ID Planilha</label><input class="inp" id="sheetIdInput" type="text"></div>
      <button class="btn-primary" onclick="saveAndDownload()">Salvar</button>
      <button class="btn-back-link" onclick="resetSearch()" style="margin-top: 5px;">Voltar</button>
    </div>

    <!-- Indicador de sincronização -->
    <div id="sync-status">
      <div id="sync-dot"></div>
      <span id="sync-text">Carregando dados...</span>
    </div>

    <!-- Barra de progresso do próximo refresh -->
    <div id="refresh-bar-wrap">
      <div id="refresh-bar"></div>
    </div>

  </div>
</div>

<script>
var SHEET_ID = '1Aj326etfqUgVa3bJ_qFtGM4k8jNn5ieC';
var appData = [];
var currentMethod = '';

var REFRESH_INTERVAL_MS = 5 * 60 * 1000;
var refreshTimer = null;
var barTimer = null;
var barStartTime = null;

window.history.pushState({page: 1}, "", "");
window.onpopstate = function(event) { resetSearch(); };

function setSyncStatus(state, text) {
  var dot = document.getElementById('sync-dot');
  var txt = document.getElementById('sync-text');
  dot.className = '';
  if (state === 'loading') { dot.classList.add('pulsing'); }
  else if (state === 'error') { dot.classList.add('error'); }
  txt.innerText = text;
}

function startProgressBar() {
  clearInterval(barTimer);
  barStartTime = Date.now();
  var bar = document.getElementById('refresh-bar');
  bar.style.transition = 'none';
  bar.style.transform = 'scaleX(1)';
  void bar.offsetWidth;
  bar.style.transition = 'transform ' + (REFRESH_INTERVAL_MS / 1000) + 's linear';
  bar.style.transform = 'scaleX(0)';
}

function formatTimeLeft(ms) {
  var totalSec = Math.ceil(ms / 1000);
  var min = Math.floor(totalSec / 60);
  var sec = totalSec % 60;
  if (min > 0) return 'Próx. sync em ' + min + 'min ' + (sec > 0 ? sec + 's' : '');
  return 'Próx. sync em ' + sec + 's';
}

function scheduleRefresh() {
  clearTimeout(refreshTimer);
  startProgressBar();
  clearInterval(barTimer);
  barTimer = setInterval(function() {
    var elapsed = Date.now() - barStartTime;
    var remaining = REFRESH_INTERVAL_MS - elapsed;
    if (remaining <= 0) { clearInterval(barTimer); }
    else { setSyncStatus('ok', formatTimeLeft(remaining)); }
  }, 1000);
  refreshTimer = setTimeout(function() { loadData(true); }, REFRESH_INTERVAL_MS);
}

function loadData(isAutoRefresh) {
  if (isAutoRefresh) { setSyncStatus('loading', 'Atualizando dados...'); }
  else { setSyncStatus('loading', 'Carregando dados...'); }

  fetch('https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:csv&t=' + Date.now())
    .then(function(r) { return r.text(); })
    .then(function(csv) {
      appData = parseCSV(csv);
      var now = new Date();
      var hhmm = now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
      setSyncStatus('ok', 'Atualizado às ' + hhmm + ' • ' + appData.length + ' registros');
      scheduleRefresh();
    })
    .catch(function(err) {
      console.error('Erro ao carregar dados:', err);
      setSyncStatus('error', 'Falha ao sincronizar. Tentando em 5min...');
      scheduleRefresh();
    });
}

function parseCSV(csv) {
  const lines = csv.split(/\r?\n/);
  if (lines.length < 1) return [];
  const headers = lines[0].split(',').map(h => h.replace(/"/g, '').trim().toUpperCase());
  return lines.slice(1).map(line => {
    const values = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g, '').trim());
    let obj = {}; headers.forEach((h, i) => obj[h] = values[i]); return obj;
  });
}

function interpretarCodTurma(codigo) {
  if (!codigo) return "Não informado";
  const match = codigo.match(/\.?(\d)([MV])\.?/i);
  if (!match) return "Horário Especial";
  const dia = match[1]; const turno = match[2].toUpperCase();
  const diasMap = {'0':'Diário','2':'Segunda-feira','3':'Terça-feira','4':'Quarta-feira','5':'Quinta-feira','6':'Sexta-feira'};
  return (diasMap[dia] || 'Outro') + ' (' + ((turno === 'M') ? 'Matutino' : 'Vespertino') + ')';
}

function chooseMethod(method) {
  currentMethod = method;
  const configs = {
    nome:      { title: 'Digite seu nome',       desc: 'Exatamente como está no cadastro',  label: 'Nome Completo', placeholder: 'Seu nome completo...', inputmode: 'text',    maxlength: '' },
    cpf:       { title: 'Digite seu CPF',         desc: 'Somente números ou com pontuação',  label: 'CPF',           placeholder: '000.000.000-00',       inputmode: 'numeric', maxlength: '14' },
    matricula: { title: 'Digite sua matrícula',   desc: 'O número completo da matrícula',    label: 'Matrícula',     placeholder: 'Sua matrícula...',      inputmode: 'numeric', maxlength: '' }
  };
  const c = configs[method];
  document.getElementById('inputTitle').innerText = c.title;
  document.getElementById('inputDesc').innerText = c.desc;
  document.getElementById('inputLabel').innerText = c.label;
  const inp = document.getElementById('iValor');
  inp.placeholder = c.placeholder;
  inp.setAttribute('inputmode', c.inputmode);
  if (c.maxlength) inp.setAttribute('maxlength', c.maxlength);
  else inp.removeAttribute('maxlength');
  inp.value = '';

  document.getElementById('screenChoose').style.display = 'none';
  const screenInput = document.getElementById('screenInput');
  screenInput.style.display = 'flex';
  screenInput.classList.remove('slide-in');
  void screenInput.offsetWidth;
  screenInput.classList.add('slide-in');

  setTimeout(() => inp.focus(), 100);
  window.history.pushState({page: 2}, "", "");

  if (method === 'cpf') { inp.addEventListener('input', maskCPF); }
  else { inp.removeEventListener('input', maskCPF); }
}

function maskCPF(e) {
  let x = e.target.value.replace(/\D/g, '').match(/(\d{0,3})(\d{0,3})(\d{0,3})(\d{0,2})/);
  e.target.value = !x[2] ? x[1] : x[1] + '.' + x[2] + (x[3] ? '.' + x[3] : '') + (x[4] ? '-' + x[4] : '');
}

function goBack() {
  currentMethod = '';
  document.getElementById('screenInput').style.display = 'none';
  document.getElementById('screenChoose').style.display = 'flex';
}

function doSearch() {
  const raw = document.getElementById('iValor').value.trim();
  if (!raw) return;

  let f = null;

  if (currentMethod === 'nome') {
    const n = raw.toLowerCase();
    f = appData.find(row => (row.NOME || "").toLowerCase().trim() === n);
  } else if (currentMethod === 'cpf') {
    const c = raw.replace(/\D/g, '');
    if (c.length !== 11) { showAlert('CPF inválido. Digite os 11 dígitos.'); return; }
    f = appData.find(row => (row["CPF DO APRENDIZ"] || "").replace(/\D/g, '') === c);
  } else if (currentMethod === 'matricula') {
    f = appData.find(row => (row.MATRICULA || "").toString().trim() === raw);
  }

  if (f) {
    const codTurma = f.CODTURMA || "Não consta";
    const nomePredio = f["NOME PREDIO"] || f.NOME_PREDIO || "Não informado";

    document.getElementById('salaVal').innerText = f.NOME_SALA || "S/N";
    document.getElementById('nomeVal').innerText = f.NOME;
    document.getElementById('predioVal').innerText = nomePredio;
    document.getElementById('turmaCodVal').innerText = codTurma;
    document.getElementById('diaSemanaVal').innerText = interpretarCodTurma(codTurma);
    document.getElementById('screenInput').style.display = 'none';
    document.getElementById('result').style.display = 'flex';
    window.history.pushState({page: 3}, "", "");
  } else {
    showAlert('Dados não encontrados. Tente outra opção.');
    setTimeout(() => {
      document.getElementById('screenInput').style.display = 'none';
      document.getElementById('screenChoose').style.display = 'flex';
      currentMethod = '';
    }, 2800);
  }
}

function showAlert(msg) {
  const alertDiv = document.getElementById('custom-alert');
  if (msg) alertDiv.innerText = msg;
  alertDiv.classList.add('show');
  setTimeout(() => { alertDiv.classList.remove('show'); }, 3000);
}

function resetSearch() {
  currentMethod = '';
  document.getElementById('result').style.display = 'none';
  document.getElementById('adminPanel').style.display = 'none';
  document.getElementById('screenInput').style.display = 'none';
  document.getElementById('screenChoose').style.display = 'flex';
}

function toggleAdmin() {
  const admin = document.getElementById('adminPanel');
  if(admin.style.display === 'none') {
    document.getElementById('screenChoose').style.display = 'none';
    document.getElementById('screenInput').style.display = 'none';
    document.getElementById('result').style.display = 'none';
    admin.style.display = 'flex';
    document.getElementById('sheetIdInput').value = SHEET_ID;
    window.history.pushState({page: 4}, "", "");
  } else { resetSearch(); }
}

function saveAndDownload() {
  const nid = document.getElementById('sheetIdInput').value.trim();
  if(!nid) return;
  let code = document.documentElement.outerHTML.replace(/var SHEET_ID = '.*?';/, "var SHEET_ID = '" + nid + "';");
  const blob = new Blob([code], {type: "text/html"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = "index.html"; a.click();
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && document.getElementById('screenInput').style.display !== 'none') doSearch();
});

window.onload = function() { loadData(false); };
</script>
</body>
</html>
